<mat-sidenav-container class="sidenav-container" *ngIf="authService.isLoggedIn(); else loginTemplate">

  <mat-sidenav #sidenav mode="side" opened class="sidenav">
    <div class="logo-container">
      <h2>Yönetim Paneli</h2>
    </div>
    <mat-nav-list>
      <a mat-list-item routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <mat-icon matListItemIcon>dashboard</mat-icon> <span matListItemTitle>Ana Sayfa</span>
      </a>
      <a mat-list-item routerLink="/personel" routerLinkActive="active">
        <mat-icon matListItemIcon>people</mat-icon> <span matListItemTitle>Personeller</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>

    <mat-toolbar color="primary" class="top-toolbar">
      <button mat-icon-button (click)="sidenav.toggle()">
        <mat-icon>menu</mat-icon>
      </button>
      <span>Personel Yönetim Sistemi</span>

      <span style="flex: 1 1 auto;"></span> <div class="search-box">
        <mat-icon style="font-size: 20px; color: #666; padding-left: 8px;">search</mat-icon>
        <input type="text" placeholder="Hızlı Ara..." (input)="onSearch($event)">
      </div>

      <span style="font-size: 14px; margin-right: 15px; font-weight: 500;">
        Hoşgeldin, {{ authService.getCurrentUser() | titlecase }}
      </span>

      <button mat-button (click)="authService.logout()">
        <mat-icon>logout</mat-icon> Çıkış
      </button>
    </mat-toolbar>

    <div class="main-content" style="padding: 20px;">
      <router-outlet></router-outlet>
    </div>

  </mat-sidenav-content>
</mat-sidenav-container>

<ng-template #loginTemplate>
  <router-outlet></router-outlet>
</ng-template>
