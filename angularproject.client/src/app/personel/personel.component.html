<div class="crm-container" style="padding: 20px;">

  <div style="margin-bottom: 15px; display: flex; justify-content: flex-end;">
    <button mat-raised-button color="primary" (click)="yeniPersonelEkle()">
      <mat-icon>add</mat-icon> Yeni Personel Ekle
    </button>
  </div>

  <div class="card">

  </div>

</div>
