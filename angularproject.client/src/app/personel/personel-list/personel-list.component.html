<div style="margin-bottom: 15px; font-size: 14px; color: #666;">
  Toplam <strong>{{ personeller.length }}</strong> personelden
  <strong>{{ gorunenPersoneller.length }}</strong> tanesi gösteriliyor.
</div>

<table mat-table [dataSource]="gorunenPersoneller" class="mat-elevation-z8" style="width: 100%; margin-top: 15px;">

  <ng-container matColumnDef="ad">
    <th mat-header-cell *matHeaderCellDef> Ad </th>
    <td mat-cell *matCellDef="let p"> {{ p.ad | titlecase }} </td>
  </ng-container>

  <ng-container matColumnDef="soyad">
    <th mat-header-cell *matHeaderCellDef> Soyad </th>
    <td mat-cell *matCellDef="let p"> {{ p.soyad | uppercase }} </td>
  </ng-container>

  <ng-container matColumnDef="departman">
    <th mat-header-cell *matHeaderCellDef> Departman </th>
    <td mat-cell *matCellDef="let p"> {{ p.departman }} </td>
  </ng-container>

  <ng-container matColumnDef="islem">
    <th mat-header-cell *matHeaderCellDef> İşlemler </th>
    <td mat-cell *matCellDef="let p">

      <button mat-flat-button color="primary" (click)="onSec(p)" style="margin-right: 8px;">
        <mat-icon>edit</mat-icon> Düzenle
      </button>

      <button mat-flat-button color="warn" (click)="onSil(p.id)">
        <mat-icon>delete</mat-icon> Sil
      </button>

    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>
