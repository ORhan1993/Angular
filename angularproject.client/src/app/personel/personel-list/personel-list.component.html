<div class="mat-elevation-z8">
  <table mat-table [dataSource]="dataSource" matSort style="width: 100%;">

    <ng-container matColumnDef="ad">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Ad </th>
      <td mat-cell *matCellDef="let p"> {{ p.ad | titlecase }} </td>
    </ng-container>

    <ng-container matColumnDef="soyad">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Soyad </th>
      <td mat-cell *matCellDef="let p"> {{ p.soyad | uppercase }} </td>
    </ng-container>

    <ng-container matColumnDef="departman">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Departman </th>
      <td mat-cell *matCellDef="let p"> {{ p.departman }} </td>
    </ng-container>

    <ng-container matColumnDef="islem">
      <th mat-header-cell *matHeaderCellDef> İşlemler </th>
      <td mat-cell *matCellDef="let p">
        <button mat-icon-button color="primary" (click)="onSec(p)" style="margin-right: 8px;">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="onSil(p.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons aria-label="Sayfa seçin"></mat-paginator>
</div>
