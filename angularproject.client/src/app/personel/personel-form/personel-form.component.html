<div class="card mat-elevation-z4" style="padding: 20px; background: white; border-radius: 8px;">

  <h3 *ngIf="!seciliPersonel" style="margin-top: 0; color: #3f51b5;">Yeni Personel Ekle</h3>
  <h3 *ngIf="seciliPersonel" style="margin-top: 0; color: #ff4081;">Personel Güncelle</h3>

  <form [formGroup]="personelForm" (ngSubmit)="kaydet()" autocomplete="off" style="display: flex; flex-direction: column; gap: 15px;">

    <mat-form-field appearance="outline" style="width: 100%;">
      <mat-label>Ad</mat-label>
      <input matInput formControlName="ad" placeholder="Örn: Ahmet">
      <mat-error *ngIf="personelForm.get('ad')?.invalid">
        Ad alanı zorunludur ve en az 2 karakter olmalıdır.
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" style="width: 100%;">
      <mat-label>Soyad</mat-label>
      <input matInput formControlName="soyad" placeholder="Örn: Yılmaz">
      <mat-error *ngIf="personelForm.get('soyad')?.invalid">Soyad alanı zorunludur.</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" style="width: 100%;">
      <mat-label>Departman</mat-label>
      <input matInput formControlName="departman" placeholder="Örn: IT, İK, Muhasebe">
      <mat-error *ngIf="personelForm.get('departman')?.invalid">Departman alanı zorunludur.</mat-error>
    </mat-form-field>

    <div style="display: flex; gap: 10px;">
      <button mat-raised-button color="primary" type="submit" [disabled]="personelForm.invalid">
        {{ seciliPersonel ? 'Güncelle' : 'Kaydet' }}
      </button>

      <button mat-stroked-button color="warn" type="button" *ngIf="seciliPersonel" (click)="vazgec()">
        Vazgeç
      </button>
    </div>

  </form>
</div>
